<!--
  DoubleDone sign-in email. Paste into Supabase: Authentication > Emails, into BOTH the
  "Magic Link" (OTP) and "Confirm signup" templates. Set the subject to:
  Your DoubleDone sign-in code
  {{ .Token }} is the 6-digit code. Table layout + inline styles for email-client support;
  Georgia stands in for Newsreader (custom fonts do not load in mail).
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#FAF6F1;margin:0;padding:32px 0;">
  <tr>
    <td align="center" style="padding:0 16px;">
      <table role="presentation" width="440" cellpadding="0" cellspacing="0" style="width:440px;max-width:100%;">
        <tr><td style="padding:0 28px;font-family:Georgia,'Times New Roman',serif;font-size:20px;color:#2B2722;">DoubleDone</td></tr>
        <tr><td style="padding:18px 28px 0;font-family:Georgia,'Times New Roman',serif;font-size:25px;line-height:1.3;color:#2B2722;">Your sign-in code</td></tr>
        <tr><td style="padding:10px 28px 0;font-family:Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;color:#5C5349;">Enter this code to sign in. It expires in an hour.</td></tr>
        <tr><td style="padding:18px 28px;">
          <div style="background-color:#FFFFFF;border:1px solid #ECE4D8;border-radius:12px;padding:18px 0;text-align:center;font-family:Helvetica,Arial,sans-serif;font-size:32px;font-weight:bold;letter-spacing:8px;color:#9B6A7D;">{{ .Token }}</div>
        </td></tr>
        <tr><td style="padding:0 28px;font-family:Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;color:#8A7F73;">If you didn't ask to sign in, you can ignore this email. Nothing will happen.</td></tr>
        <tr><td style="padding:24px 28px 0;font-family:Helvetica,Arial,sans-serif;font-size:12px;color:#A89E93;">DoubleDone, a calmer kind of to-do.</td></tr>
      </table>
    </td>
  </tr>
</table>
