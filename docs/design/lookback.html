document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

D8CA;\"><\u002Fdiv><div style=\"width:6px;height:6px;border-radius:999px;background:#E2D8CA;\"><\u002Fdiv><div style=\"width:6px;height:6px;border-radius:999px;background:#E2D8CA;\"><\u002Fdiv><\u002Fdiv>\n                <p style=\"font-family:'Newsreader',serif;font-size:20px;line-height:1.3;color:#2B2722;margin:0 0 8px;\">Nothing here yet.<\u002Fp>\n                <p style=\"font-size:15px;line-height:1.55;color:#7A7066;margin:0;\">This month is still ahead of you. Whatever you finish will quietly land here — no rush, no pressure.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:128px;height:5px;border-radius:999px;background:#2B2722;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-family:ui-monospace,monospace;font-size:14px;color:#7A7066;\">A warm, empty month<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:924,&quot;height&quot;:980}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.today = '2026-06-19';\n    this.completions = {\n      '2026-05-28': [{ title: 'Renewed the passport', big: true }],\n      '2026-05-30': [{ title: 'Took meds' }],\n      '2026-06-02': [{ title: 'Replied to Dana about the lease' }],\n      '2026-06-03': [{ title: 'Took meds' }, { title: 'Tidied the kitchen' }],\n      '2026-06-05': [{ title: 'Called the dentist back', big: true }],\n      '2026-06-09': [{ title: 'Watered the plants' }],\n      '2026-06-12': [{ title: 'Filed the tax return', big: true }, { title: 'Took meds' }, { title: 'Replied to three emails' }],\n      '2026-06-16': [{ title: 'Took meds' }],\n      '2026-06-18': [{ title: 'Booked the GP' }, { title: 'Took meds' }],\n      '2026-06-19': [{ title: 'Took meds' }, { title: 'Started the tax folder' }],\n      '2026-06-23': [{ title: 'Took meds' }],\n      '2026-06-25': [{ title: 'Cleared the inbox', big: true }],\n    };\n    this.state = { year: 2026, month: 5, selected: '2026-06-12' };\n  }\n\n  monthName(m) {\n    return ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'][m];\n  }\n\n  iso(y, m, d) {\n    return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;\n  }\n\n  matrix(y, m) {\n    const startDow = new Date(y, m, 1).getDay();\n    const days = new Date(y, m + 1, 0).getDate();\n    const cells = [];\n    for (let i = 0; i < startDow; i++) cells.push(null);\n    for (let d = 1; d <= days; d++) cells.push(d);\n    while (cells.length % 7 !== 0) cells.push(null);\n    const weeks = [];\n    for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));\n    return weeks;\n  }\n\n  step = (delta) => {\n    this.setState((s) => {\n      let m = s.month + delta;\n      let y = s.year;\n      if (m < 0) { m = 11; y -= 1; }\n      if (m > 11) { m = 0; y += 1; }\n      // select first completion day of the new month, if any\n      let sel = null;\n      for (let d = 1; d <= 31; d++) {\n        const iso = this.iso(y, m, d);\n        if (this.completions[iso]) { sel = iso; break; }\n      }\n      return { year: y, month: m, selected: sel };\n    });\n  };\n\n  select = (iso) => this.setState({ selected: iso });\n\n  leadFor(items) {\n    if (!items || !items.length) return '';\n    const big = items.filter((i) => i.big).length;\n    const n = items.length;\n    if (big >= 1 && n > 1) return \"The one you'd been dreading — done. And a few more.\";\n    if (big >= 1) return \"The one you'd been dreading, finally closed.\";\n    if (n >= 3) return 'A handful of quiet wins.';\n    if (n === 2) return 'Two things off your plate.';\n    return 'Quietly done.';\n  }\n\n  buildCells(y, m, opts) {\n    const interactive = opts && opts.interactive;\n    const selected = opts ? opts.selected : null;\n    return this.matrix(y, m).map((week) =>\n      week.map((d) => {\n        const cellStyle = 'flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:5px 0;';\n        if (d == null) return { isDay: false, cellStyle: cellStyle, dayNum: '', role: 'presentation', aria: '' };\n        const iso = this.iso(y, m, d);\n        const items = this.completions[iso];\n        const has = !!items;\n        const big = has && items.some((i) => i.big);\n        const isToday = iso === this.today;\n        const isSel = interactive && iso === selected;\n\n        let blobStyle = 'width:34px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;transition:background .2s ease;';\n        if (isSel) blobStyle += 'background:#9B6A7D;';\n        else if (isToday) blobStyle += 'border:1.5px solid #C9BEAF;';\n\n        const numStyle = isSel\n          ? 'font-size:15px;color:#FFFFFF;font-weight:700;line-height:1;'\n          : 'font-size:15px;color:#2B2722;line-height:1;';\n\n        let dotStyle;\n        if (big) dotStyle = 'width:10px;height:10px;border-radius:999px;background:#C4715A;';\n        else if (has) dotStyle = 'width:6px;height:6px;border-radius:999px;background:#7E9B6B;margin:2px 0;';\n        else dotStyle = 'width:6px;height:6px;background:transparent;margin:2px 0;';\n\n        const count = has ? items.length : 0;\n        const aria = has\n          ? `${d} ${this.monthName(m)}, ${count} finished${big ? ', including a big one' : ''}`\n          : `${d} ${this.monthName(m)}, nothing logged`;\n\n        return {\n          isDay: true,\n          dayNum: d,\n          cellStyle: cellStyle + (interactive ? 'cursor:pointer;' : ''),\n          blobStyle,\n          numStyle,\n          dotStyle,\n          role: interactive ? 'button' : 'presentation',\n          aria,\n          onClick: interactive ? () => this.select(iso) : null,\n        };\n      })\n    );\n  }\n\n  formatDate(iso) {\n    const [y, m, d] = iso.split('-').map(Number);\n    const wd = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][new Date(y, m - 1, d).getDay()];\n    return `${wd}, ${d} ${this.monthName(m - 1)}`;\n  }\n\n  renderVals() {\n    const { year, month, selected } = this.state;\n\n    // does the viewed month have any completions?\n    let hasAny = false;\n    for (let d = 1; d <= 31; d++) {\n      if (this.completions[this.iso(year, month, d)]) { hasAny = true; break; }\n    }\n    const selItems = selected ? (this.completions[selected] || []) : [];\n\n    const cal = {\n      monthLabel: `${this.monthName(month)} ${year}`,\n      weeks: this.buildCells(year, month, { interactive: true, selected }),\n      hasAny,\n      isEmpty: !hasAny,\n      detailDate: selected ? this.formatDate(selected) : '',\n      lead: this.leadFor(selItems),\n      items: selItems,\n      prev: () => this.step(-1),\n      next: () => this.step(1),\n    };\n\n    // static specimen: an empty future month\n    const emptyCal = {\n      monthLabel: 'September 2026',\n      weeks: this.buildCells(2026, 8, { interactive: false, selected: null }),\n    };\n\n    return { cal, emptyCal, weekdays: ['S', 'M', 'T', 'W', 'T', 'F', 'S'] };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
