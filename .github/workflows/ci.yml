name: ci

# Runs on every push + PR: quality (lint · type-check · test with a coverage
# floor), a web build (expo export), and a full-history secret scan. No repo
# secrets are required for the gates themselves.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # manual re-run from the Actions tab

jobs:
  quality:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # PIN to the runtime you deploy on so a green CI run implies prod works.
          node-version: '22'
          cache: 'npm'

      - name: Lint · Type-check · Test
        # Root is an npm-workspaces monorepo: `npm ci` installs client/ too, and
        # each gate delegates into the workspace (see root package.json scripts).
        run: |
          npm ci
          npm run lint
          npm run typecheck            # HARD gate, no '|| true'
          npm run test:coverage        # runs the tests AND enforces the coverage floor (see vitest.config.ts)

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - name: Install gitleaks
        run: |
          version=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan full history
        # `gitleaks detect` scans the entire git log, not just the push range, so
        # it is immune to the root-commit edge case in gitleaks-action@v2 (which
        # fails on the first push because the initial commit has no parent). Same
        # tool the local pre-commit Inspector runs. Exits non-zero on a find.
        run: gitleaks detect --no-banner --redact

  build:
    name: Build (web export)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Export the web bundle
        # Proves the app actually builds (catches what typecheck can't, e.g. the
        # SPA/`window`-at-build-time class of error). deploy-web ships the same
        # export on push; this also gates pull requests, and keeps "it builds" a
        # first-class CI status. EXPO_PUBLIC_* are inlined at export; they are
        # public and a missing one resolves to "" without failing the build.
        run: npx expo export -p web
        working-directory: client
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Inject + verify the SPA SEO / social meta
        # output:'single' ignores +html.tsx, so the front-door meta is patched into the
        # export. Gate it here too: a broken patch fails CI, not the deploy.
        run: |
          node scripts/inject-web-meta.mjs
          grep -q 'property="og:image"' client/dist/index.html
