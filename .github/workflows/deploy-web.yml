name: deploy-web

# Build the web bundle and ship it to Cloudflare Pages on every push to main,
# so doubledone.app always matches main without a manual deploy. Needs the
# CLOUDFLARE_API_TOKEN repo secret (scoped to Cloudflare Pages: Edit). The
# account ID is not a secret, so it lives here in the open.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build + deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build the web bundle
        run: npx expo export -p web
        working-directory: client
        # EXPO_PUBLIC_* values are inlined into the bundle at export time, so they
        # must exist on the runner here. They are public (the publishable key ships
        # in the client anyway), so they live as repo Variables, not Secrets. If a
        # var is unset it resolves to "", the Supabase client stays null, and sync
        # simply stays off, the build still succeeds.
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a02cf1c14ba965dff2b2549e9dc7e1db
          workingDirectory: client
          command: pages deploy dist --project-name=doubledone --branch=main
